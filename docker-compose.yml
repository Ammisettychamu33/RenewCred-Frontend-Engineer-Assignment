version: '3.8'

services:
  # ──────────────────────────────────────────────────────────
  # MongoDB Database Container
  # ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:latest
    container_name: renewcred-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=renewcred_cms
    volumes:
      - mongo-data:/data/db
    networks:
      - cms-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # Backend REST API Service (Express.js)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: renewcred-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/renewcred_cms
      - JWT_SECRET=renewcred_production_jwt_secret_key_2026_super_secure
      - JWT_EXPIRES_IN=24h
      - CLIENT_ADMIN_URL=http://localhost:3000
      - CLIENT_PUBLIC_URL=http://localhost:3001
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cms-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # Admin CMS Frontend App (React + Redux Toolkit)
  # ──────────────────────────────────────────────────────────
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: renewcred-admin
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cms-network

  # ──────────────────────────────────────────────────────────
  # Public Website Frontend App (Dynamic BlockRenderer + KaTeX)
  # ──────────────────────────────────────────────────────────
  public-frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile
    container_name: renewcred-public
    restart: always
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cms-network

networks:
  cms-network:
    driver: bridge

volumes:
  mongo-data:
