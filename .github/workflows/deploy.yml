name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            public-frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: Build Public Frontend
        run: |
          cd public-frontend
          npm ci
          npm run build

      - name: Build Admin Frontend
        run: |
          cd admin-frontend
          npm ci
          npm run build

      - name: Prepare Combined Web Dist
        run: |
          mkdir -p site
          cp -r public-frontend/dist/* site/
          mkdir -p site/admin
          cp -r admin-frontend/dist/* site/admin/
          cp public-frontend/dist/index.html site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
